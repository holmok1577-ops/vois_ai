services:
  voice-assistant:
    image: holmok1577/voice-assistant:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: holmok1577-voice-assistant
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      NO_PROXY: "localhost,127.0.0.1,::1"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
